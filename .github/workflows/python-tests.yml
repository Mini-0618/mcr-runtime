name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install package
        run: |
          python${{ matrix.python-version }} -m venv .venv
          .venv/bin/pip install -U pip -q
          .venv/bin/pip install -e ".[dev]" -q
          .venv/bin/pip install build -q

      - name: Verify installation
        run: |
          .venv/bin/python3 -c "import runtime; print('import PASS')"

      - name: Run verify_all.sh
        run: |
          source .venv/bin/activate
          bash scripts/verify_all.sh

      - name: Build wheel
        run: |
          .venv/bin/python3 -m build
          ls -lh dist/

      - name: Wheel smoke test
        run: |
          .venv/bin/pip install --force-reinstall dist/*.whl -q
          .venv/bin/python3 -c "import runtime; import runtime.engine; import runtime.wal; import runtime.replay_verifier; print('wheel import PASS')"
